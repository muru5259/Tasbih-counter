<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d2318">
  <meta name="description" content="Digital Tasbih counter with haptic feedback and sharing">
  <link rel="manifest" href="manifest.json">
  <title>Tasbih ✨</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d2318;
      --surface:   #163424;
      --gold:      #c9a227;
      --gold-lt:   #e8c63a;
      --gold-dim:  rgba(201, 162, 39, 0.32);
      --text:      #f5f0e0;
      --text-dim:  rgba(245, 240, 224, 0.48);
      --green-mid: #2d6a4f;
      --done:      #52b788;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    .header {
      width: 100%;
      max-width: 480px;
      padding: 20px 24px 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
    }

    .header-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .header-sub {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.18s;
      flex-shrink: 0;
    }
    .icon-btn:active { background: rgba(201,162,39,0.15); }

    /* ── DHIKR CHIPS ────────────────────────────────────── */
    .chip-row {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 14px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      flex-shrink: 0;
      padding: 7px 15px;
      border-radius: 20px;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.81rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .chip.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #162010;
      font-weight: 600;
    }
    .chip:active { opacity: 0.75; }

    /* ── COUNTER AREA ───────────────────────────────────── */
    .counter-area {
      flex: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 24px;
      gap: 6px;
    }

    .arabic-text {
      font-size: 1.55rem;
      color: var(--gold-lt);
      text-align: center;
      direction: rtl;
      font-family: 'Segoe UI', 'Arial Unicode MS', 'Noto Sans Arabic', sans-serif;
      margin-bottom: 2px;
      min-height: 2.2rem;
    }

    /* Progress ring */
    .ring-wrap {
      position: relative;
      width: 272px;
      height: 272px;
    }

    .ring-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: rgba(201,162,39,0.11);
      stroke-width: 7;
    }

    .ring-fill {
      fill: none;
      stroke: url(#rg);
      stroke-width: 7;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.22s cubic-bezier(.4,0,.2,1);
    }

    .ring-fill.done-pulse {
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }

    /* Tap button */
    .tap-btn {
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 34%, #2a5e41 0%, #0e2116 72%);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      box-shadow:
        0 12px 50px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(201,162,39,0.22),
        inset 0 1px 0 rgba(255,255,255,0.07);
      transition: transform 0.09s ease, box-shadow 0.09s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .tap-btn.press {
      transform: scale(0.92);
      box-shadow:
        0 4px 22px rgba(0,0,0,0.55),
        inset 0 0 0 1px rgba(201,162,39,0.22);
    }

    .count-num {
      font-size: 4.8rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: transform 0.08s ease;
    }

    .count-num.bump {
      transform: scale(1.12);
    }

    .tap-hint {
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .target-text {
      font-size: 0.82rem;
      color: var(--text-dim);
      min-height: 1.1rem;
    }

    .target-text .done-label { color: var(--done); }

    /* ── CONTROLS ───────────────────────────────────────── */
    .controls {
      width: 100%;
      max-width: 480px;
      padding: 10px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .ctrl-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: rgba(201,162,39,0.06);
      color: var(--gold);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .ctrl-btn svg { width: 21px; height: 21px; }
    .ctrl-btn:active { transform: scale(0.88); background: rgba(201,162,39,0.18); }

    .ctrl-btn.share-btn {
      width: 66px;
      height: 66px;
      background: var(--gold);
      border-color: var(--gold);
      color: #162010;
      box-shadow: 0 4px 20px rgba(201,162,39,0.35);
    }
    .ctrl-btn.share-btn:active { background: var(--gold-lt); transform: scale(0.9); }

    /* ── SESSIONS ───────────────────────────────────────── */
    .sessions-wrap {
      width: 100%;
      max-width: 480px;
      padding: 2px 24px 20px;
      overflow-y: auto;
      max-height: 155px;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }

    .sessions-label {
      font-size: 0.65rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .session-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      margin-bottom: 5px;
      font-size: 0.81rem;
    }

    .s-name  { color: var(--text); font-weight: 500; margin-bottom: 2px; }
    .s-when  { color: var(--text-dim); font-size: 0.7rem; }
    .s-count { color: var(--gold); font-weight: 600; text-align: right; }
    .s-tick  { color: var(--done); font-size: 0.7rem; text-align: right; }

    /* ── COMPLETE OVERLAY ───────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 18, 10, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      padding: 30px;
      text-align: center;
    }
    .overlay.show { opacity: 1; pointer-events: all; }

    .ov-icon { font-size: 3.8rem; animation: float 2.2s ease-in-out infinite; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    .ov-title { font-size: 2rem; font-weight: 700; color: var(--gold); }
    .ov-arabic {
      font-size: 1.4rem;
      color: var(--gold-lt);
      direction: rtl;
      font-family: 'Segoe UI', 'Arial Unicode MS', sans-serif;
    }
    .ov-msg { font-size: 0.92rem; color: var(--text-dim); line-height: 1.55; max-width: 300px; }

    .ov-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 6px; }

    .btn-gold {
      padding: 13px 26px;
      border-radius: 28px;
      background: var(--gold);
      color: #162010;
      font-weight: 700;
      font-size: 0.92rem;
      border: none;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-gold:active { transform: scale(0.93); }

    .btn-outline {
      padding: 13px 26px;
      border-radius: 28px;
      background: transparent;
      color: var(--gold);
      font-weight: 600;
      font-size: 0.92rem;
      border: 1px solid var(--gold-dim);
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn-outline:active { background: rgba(201,162,39,0.12); }

    /* ── SETTINGS MODAL ─────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
      padding: 20px;
    }
    .modal-bg.show { opacity: 1; pointer-events: all; }

    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 26px 22px;
      width: 100%;
      max-width: 320px;
      border: 1px solid var(--gold-dim);
    }

    .modal-title { font-size: 1rem; font-weight: 600; color: var(--gold); margin-bottom: 6px; }
    .modal-hint  { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 14px; }

    .modal-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--gold-dim);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.05rem;
      outline: none;
      margin-bottom: 14px;
    }
    .modal-input:focus { border-color: var(--gold); }

    .modal-btns { display: flex; gap: 8px; }
    .modal-btns .btn-gold  { flex: 1; }
    .modal-btns .btn-outline { flex: 1; }

    /* ── TOAST ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: rgba(201,162,39,0.92);
      color: #162010;
      padding: 9px 22px;
      border-radius: 22px;
      font-size: 0.84rem;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── SHARE DRAWER ───────────────────────────────────── */
    .drawer-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      z-index: 350;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .drawer-bg.show { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      border-top: 1px solid var(--gold-dim);
      padding: 20px 24px 36px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      z-index: 360;
      max-width: 480px;
      margin: 0 auto;
    }
    .drawer-bg.show .drawer { transform: translateY(0); }

    .drawer-handle {
      width: 38px;
      height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    .drawer-title { font-size: 1rem; font-weight: 600; color: var(--gold); margin-bottom: 16px; }

    .share-preview {
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 0.84rem;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .share-options { display: flex; gap: 12px; flex-wrap: wrap; }

    .share-opt {
      flex: 1;
      min-width: 110px;
      padding: 11px 14px;
      border-radius: 12px;
      border: 1px solid var(--gold-dim);
      background: rgba(201,162,39,0.06);
      color: var(--gold);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s;
    }
    .share-opt:active { transform: scale(0.93); background: rgba(201,162,39,0.18); }
    .share-opt.wa { background: rgba(37,211,102,0.1); border-color: rgba(37,211,102,0.4); color: #25d366; }
    .share-opt.wa:active { background: rgba(37,211,102,0.22); }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-brand">
      <div class="header-title">Tasbih</div>
      <div class="header-sub">Digital Counter</div>
    </div>
    <button class="icon-btn" id="settings-btn" aria-label="Settings">⚙️</button>
  </div>

  <!-- DHIKR CHIPS -->
  <div class="chip-row" id="chip-row"></div>

  <!-- COUNTER AREA -->
  <div class="counter-area">
    <div class="arabic-text" id="arabic-text"></div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 272 272">
        <defs>
          <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#c9a227"/>
            <stop offset="100%" stop-color="#e8c63a"/>
          </linearGradient>
        </defs>
        <circle class="ring-track" cx="136" cy="136" r="122"/>
        <circle class="ring-fill"  cx="136" cy="136" r="122" id="ring-fill"/>
      </svg>

      <button class="tap-btn" id="tap-btn" aria-label="Tap to count">
        <div class="count-num" id="count-num">0</div>
        <div class="tap-hint">TAP</div>
      </button>
    </div>

    <div class="target-text" id="target-text"></div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" id="undo-btn" aria-label="Undo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 14 4 9 9 4"/>
        <path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
      </svg>
    </button>

    <button class="ctrl-btn share-btn" id="share-btn" aria-label="Share">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/>
        <circle cx="6" cy="12" r="3"/>
        <circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>

    <button class="ctrl-btn" id="reset-btn" aria-label="Reset">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
        <path d="M3 3v5h5"/>
      </svg>
    </button>
  </div>

  <!-- SESSION HISTORY -->
  <div class="sessions-wrap" id="sessions-wrap"></div>

  <!-- ── COMPLETE OVERLAY ──────────────────────────────────────────────────── -->
  <div class="overlay" id="complete-overlay">
    <div class="ov-icon">🤲</div>
    <div class="ov-title">Alhamdulillah!</div>
    <div class="ov-arabic" id="ov-arabic"></div>
    <div class="ov-msg" id="ov-msg"></div>
    <div class="ov-btns">
      <button class="btn-gold"    id="ov-share-btn">Share 🌙</button>
      <button class="btn-outline" id="ov-continue-btn">Continue</button>
      <button class="btn-outline" id="ov-new-btn">New Session</button>
    </div>
  </div>

  <!-- ── SETTINGS MODAL ────────────────────────────────────────────────────── -->
  <div class="modal-bg" id="settings-modal">
    <div class="modal-card">
      <div class="modal-title">Custom Target</div>
      <div class="modal-hint">Set your own count goal (1 – 10,000)</div>
      <input type="number" class="modal-input" id="custom-input"
             placeholder="e.g. 500" min="1" max="10000" inputmode="numeric">
      <div class="modal-btns">
        <button class="btn-gold"    id="modal-set-btn">Set</button>
        <button class="btn-outline" id="modal-cancel-btn">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── SHARE DRAWER ──────────────────────────────────────────────────────── -->
  <div class="drawer-bg" id="drawer-bg">
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="drawer-title">Share your dhikr 🌙</div>
      <div class="share-preview" id="share-preview"></div>
      <div class="share-options">
        <button class="share-opt wa" id="wa-btn">
          <svg width="17" height="17" viewBox="0 0 32 32" fill="currentColor">
            <path d="M16 3C8.82 3 3 8.82 3 16c0 2.4.63 4.65 1.73 6.6L3 29l6.54-1.71A13.02 13.02 0 0 0 16 29c7.18 0 13-5.82 13-13S23.18 3 16 3zm0 23.85c-2.1 0-4.08-.6-5.77-1.63l-.41-.25-4.27 1.12 1.13-4.13-.27-.43A10.85 10.85 0 0 1 5.15 16C5.15 10.02 10.02 5.15 16 5.15S26.85 10.02 26.85 16 21.98 26.85 16 26.85zm6.08-8.08c-.33-.17-1.96-.97-2.27-1.08-.3-.11-.52-.17-.73.17-.22.33-.84 1.08-1.03 1.3-.19.22-.38.25-.71.08-.33-.17-1.4-.51-2.66-1.64-.98-.87-1.65-1.95-1.84-2.28-.19-.33-.02-.51.14-.68.15-.15.33-.38.5-.57.17-.19.22-.33.33-.55.11-.22.06-.41-.03-.57-.08-.17-.73-1.76-1-2.41-.26-.63-.53-.55-.73-.56h-.62c-.22 0-.57.08-.86.41-.3.33-1.13 1.1-1.13 2.69s1.16 3.12 1.32 3.34c.17.22 2.28 3.48 5.52 4.88.77.33 1.37.53 1.84.68.77.25 1.48.21 2.03.13.62-.09 1.96-.8 2.24-1.57.27-.77.27-1.43.19-1.57-.08-.14-.3-.22-.62-.38z"/>
          </svg>
          WhatsApp
        </button>
        <button class="share-opt" id="native-share-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
          Share
        </button>
        <button class="share-opt" id="copy-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    // ── DHIKR DATA ──────────────────────────────────────────────────────────
    const DHIKR = [
      { name: 'SubhanAllah',     arabic: 'سُبْحَانَ اللهِ',            target: 33  },
      { name: 'Alhamdulillah',   arabic: 'الْحَمْدُ لِلَّهِ',          target: 33  },
      { name: 'Allahu Akbar',    arabic: 'اللَّهُ أَكْبَرُ',           target: 34  },
      { name: 'Astaghfirullah',  arabic: 'أَسْتَغْفِرُ اللَّهَ',       target: 100 },
      { name: 'Durood Sharif',   arabic: 'صَلِّ عَلَى النَّبِيِّ',     target: 100 },
    ];

    // ── RING GEOMETRY ────────────────────────────────────────────────────────
    const R    = 122;
    const CIRC = +(2 * Math.PI * R).toFixed(2); // ≈ 766.55

    // ── STATE ────────────────────────────────────────────────────────────────
    let count        = 0;
    let dhikrIdx     = 0;
    let customTarget = null;
    let completed    = false;
    let saved        = false;
    let sessions     = JSON.parse(localStorage.getItem('tasbih_v2') || '[]');

    const getTarget   = () => customTarget ?? DHIKR[dhikrIdx].target;
    const getProgress = () => Math.min(count / getTarget(), 1);

    // ── DOM ──────────────────────────────────────────────────────────────────
    const $countNum  = document.getElementById('count-num');
    const $ringFill  = document.getElementById('ring-fill');
    const $arabicTxt = document.getElementById('arabic-text');
    const $targetTxt = document.getElementById('target-text');
    const $tapBtn    = document.getElementById('tap-btn');
    const $sessions  = document.getElementById('sessions-wrap');
    const $overlay   = document.getElementById('complete-overlay');
    const $drawerBg  = document.getElementById('drawer-bg');
    const $sharePrev = document.getElementById('share-preview');
    const $toast     = document.getElementById('toast');
    const $settModal = document.getElementById('settings-modal');

    // init ring
    $ringFill.style.strokeDasharray  = CIRC;
    $ringFill.style.strokeDashoffset = CIRC;

    // ── BUILD CHIPS ──────────────────────────────────────────────────────────
    const chipRow = document.getElementById('chip-row');
    DHIKR.forEach((d, i) => {
      const btn = document.createElement('button');
      btn.className = 'chip' + (i === 0 ? ' active' : '');
      btn.textContent = d.name;
      btn.addEventListener('click', () => selectDhikr(i));
      chipRow.appendChild(btn);
    });
    const customChip = document.createElement('button');
    customChip.className = 'chip';
    customChip.id = 'custom-chip';
    customChip.textContent = '+ Custom';
    customChip.addEventListener('click', openSettings);
    chipRow.appendChild(customChip);

    function selectDhikr(i) {
      dhikrIdx = i;
      customTarget = null;
      document.querySelectorAll('.chip').forEach((c, ci) =>
        c.classList.toggle('active', ci === i));
      doReset(false);
    }

    // ── RENDER ───────────────────────────────────────────────────────────────
    function render() {
      const d = DHIKR[dhikrIdx];
      $arabicTxt.textContent = d.arabic;
      $countNum.textContent  = count;

      $ringFill.style.strokeDashoffset = CIRC * (1 - getProgress());

      const rem = getTarget() - count;
      if (rem > 0) {
        $targetTxt.innerHTML = `${count} <span style="color:var(--gold-dim)">/</span> ${getTarget()} &nbsp;·&nbsp; ${rem} remaining`;
      } else {
        $targetTxt.innerHTML = `<span class="done-label">✓ ${count} completed</span>`;
      }
    }

    function renderSessions() {
      if (!sessions.length) { $sessions.innerHTML = ''; return; }
      $sessions.innerHTML =
        `<div class="sessions-label">Recent Sessions</div>` +
        sessions.map(s => `
          <div class="session-row">
            <div>
              <div class="s-name">${s.dhikr}</div>
              <div class="s-when">${s.day} · ${s.time}</div>
            </div>
            <div>
              <div class="s-count">${s.count}/${s.target}</div>
              ${s.done ? '<div class="s-tick">✓ Complete</div>' : ''}
            </div>
          </div>`).join('');
    }

    // ── TAP ──────────────────────────────────────────────────────────────────
    function handleTap() {
      count++;
      haptic(28);

      $tapBtn.classList.add('press');
      $countNum.classList.add('bump');
      setTimeout(() => { $tapBtn.classList.remove('press'); $countNum.classList.remove('bump'); }, 110);

      render();

      if (count === getTarget() && !completed) {
        completed = true;
        setTimeout(showComplete, 380);
      }
    }

    // use pointerdown so it fires immediately on touch without the 300ms delay
    $tapBtn.addEventListener('pointerdown', e => { e.preventDefault(); handleTap(); });
    // Space / Enter keyboard support
    document.addEventListener('keydown', e => {
      if ((e.code === 'Space' || e.code === 'Enter') && !document.querySelector('.modal-bg.show') && !$settModal.classList.contains('show')) {
        e.preventDefault();
        handleTap();
      }
    });

    // ── HAPTIC ───────────────────────────────────────────────────────────────
    function haptic(pattern) {
      if ('vibrate' in navigator) {
        try { navigator.vibrate(pattern); } catch (_) {}
      }
    }

    // ── UNDO ─────────────────────────────────────────────────────────────────
    document.getElementById('undo-btn').addEventListener('click', () => {
      if (count <= 0) return;
      count--;
      completed = false;
      saved     = false;
      $overlay.classList.remove('show');
      $ringFill.classList.remove('done-pulse');
      haptic(14);
      render();
    });

    // ── RESET ────────────────────────────────────────────────────────────────
    document.getElementById('reset-btn').addEventListener('click', () => {
      if (count === 0) return;
      doReset(true);
    });

    function doReset(saveIt = true) {
      if (saveIt && count > 0 && !saved) saveSession();
      count     = 0;
      completed = false;
      saved     = false;
      $overlay.classList.remove('show');
      $ringFill.classList.remove('done-pulse');
      haptic(18);
      render();
      renderSessions();
    }

    // ── SAVE SESSION ─────────────────────────────────────────────────────────
    function saveSession() {
      saved = true;
      sessions.unshift({
        dhikr:  DHIKR[dhikrIdx].name,
        count,
        target: getTarget(),
        done:   count >= getTarget(),
        day:    new Date().toLocaleDateString([], { month: 'short', day: 'numeric' }),
        time:   new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
      });
      sessions = sessions.slice(0, 10);
      localStorage.setItem('tasbih_v2', JSON.stringify(sessions));
    }

    // ── COMPLETE ─────────────────────────────────────────────────────────────
    function showComplete() {
      haptic([70, 35, 70, 35, 150]);
      $ringFill.classList.add('done-pulse');

      const d = DHIKR[dhikrIdx];
      document.getElementById('ov-arabic').textContent = d.arabic;
      document.getElementById('ov-msg').textContent =
        `You completed ${getTarget()} ${d.name}. May Allah accept your dhikr and reward you abundantly. 🤍`;

      if (!saved) saveSession();
      renderSessions();
      $overlay.classList.add('show');
    }

    document.getElementById('ov-continue-btn').addEventListener('click', () =>
      $overlay.classList.remove('show'));

    document.getElementById('ov-new-btn').addEventListener('click', () => doReset(false));

    document.getElementById('ov-share-btn').addEventListener('click', openShareDrawer);

    // ── SHARE ────────────────────────────────────────────────────────────────
    function buildShareText() {
      const d    = DHIKR[dhikrIdx];
      const done = count >= getTarget();
      const line1 = done
        ? `🤲 Alhamdulillah! I just completed ${getTarget()} ${d.name} (${d.arabic})!`
        : `🌙 I've counted ${count} out of ${getTarget()} ${d.name} today!`;
      return `${line1}\n\nJoin me in daily dhikr — track your counts with the Tasbih Counter ✨`;
    }

    function openShareDrawer() {
      $sharePrev.textContent = buildShareText();
      $drawerBg.classList.add('show');
    }

    // close drawer on background tap
    $drawerBg.addEventListener('click', e => {
      if (e.target === $drawerBg) $drawerBg.classList.remove('show');
    });

    // WhatsApp
    document.getElementById('wa-btn').addEventListener('click', () => {
      const text = encodeURIComponent(buildShareText() + '\n' + location.href);
      window.open(`https://wa.me/?text=${text}`, '_blank');
      $drawerBg.classList.remove('show');
    });

    // Native share
    document.getElementById('native-share-btn').addEventListener('click', async () => {
      $drawerBg.classList.remove('show');
      if (navigator.share) {
        try {
          await navigator.share({
            title: 'Tasbih Counter',
            text:  buildShareText(),
            url:   location.href,
          });
        } catch (_) {}
      } else {
        copyToClipboard();
      }
    });

    // Copy to clipboard
    document.getElementById('copy-btn').addEventListener('click', copyToClipboard);

    async function copyToClipboard() {
      const text = buildShareText() + '\n\n' + location.href;
      try {
        await navigator.clipboard.writeText(text);
        $drawerBg.classList.remove('show');
        showToast('Copied to clipboard 📋');
      } catch (_) {
        showToast('Could not copy — try selecting manually');
      }
    }

    // main share button opens drawer
    document.getElementById('share-btn').addEventListener('click', openShareDrawer);

    // ── TOAST ────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove('show'), 2800);
    }

    // ── SETTINGS (CUSTOM TARGET) ─────────────────────────────────────────────
    function openSettings() { $settModal.classList.add('show'); }

    document.getElementById('settings-btn').addEventListener('click', openSettings);

    document.getElementById('modal-cancel-btn').addEventListener('click', () =>
      $settModal.classList.remove('show'));

    document.getElementById('modal-set-btn').addEventListener('click', () => {
      const val = parseInt(document.getElementById('custom-input').value, 10);
      if (!val || val < 1 || val > 10000) {
        showToast('Enter a number between 1 and 10,000');
        return;
      }
      customTarget = val;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      document.getElementById('custom-chip').classList.add('active');
      document.getElementById('custom-chip').textContent = `⚙ ${val}`;
      doReset(false);
      $settModal.classList.remove('show');
      showToast(`Target set to ${val} 🎯`);
    });

    // close settings on background tap
    $settModal.addEventListener('click', e => {
      if (e.target === $settModal) $settModal.classList.remove('show');
    });

    // ── BOOT ─────────────────────────────────────────────────────────────────
    render();
    renderSessions();
  </script>
</body>
</html>
